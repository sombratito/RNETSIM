version: "3.8"

services:
  visualizer:
    build:
      context: .
      dockerfile: Dockerfile.visualizer
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - rnetsim-data:/data
    environment:
      - RNETSIM_DATA_DIR=/data

volumes:
  rnetsim-data:
